[rx]
# RadioMaster XR via external CP2102 at the adapter's exact 460800 baud divisor.
# by-path names: both CP2102s report serial "0001" so by-id collides and ttyUSB
# numbering swaps on replug. These are stable per physical USB socket.
port = /dev/serial/by-path/pci-0000:02:00.0-usb-0:9:1.0-port0
baud = 460800

[tx]
# RadioMaster Nomad USB-C (internal CP2102 -> ESP32 UART0). On the stock layout this
# is flash/debug/reset only: firmware remaps UART0 to the bay pin (GPIO4) at boot.
flash_port = /dev/serial/by-path/pci-0000:02:00.0-usb-0:8:1.0-port0
# hardware.json override APPLIED 2026-07-13 (serial_rx:3/serial_tx:1 — see README):
# USB is the handset port. Revert: esptool erase_region 0x3d0000 0x20000, then clear this.
handset_port = /dev/serial/by-path/pci-0000:02:00.0-usb-0:8:1.0-port0
handset_baud = 921600

[test]
# 20s is plenty for stock ELRS; PrivacyLRS session establishment is currently
# much slower (cold-start LQ alone measured at ~30s), hence the longer window.
timeout_seconds = 75
parameter_timeout_seconds = 3.0
channel_tolerance_us = 8

[rf_sweep]
# Known starting/restoration mode. Rate labels are resolved only after selecting
# this band because ELRS advertises a different packet-rate table for each band.
initial_band = 2.4GHz
initial_rate = 150Hz(-112dBm)
telemetry_ratio = 1:2
# Put both directly connected devices into bind mode before the initial link wait.
manual_bind = false
reestablish_timeout_seconds = 75
post_link_dwell_seconds = 1

# Restrict what rf-sweep tests. test_bands: 'all' or comma-separated band labels
# exactly as the TX advertises them (this pair cannot receive X-Band: the XR1
# has a single LR1121 and stock firmware rejects Dual-Band modes on it).
# test_rates: 'all', 'none' (band transitions only — the fast path), or
# comma-separated rate-label prefixes, e.g. 250Hz,K1000
test_bands = 2.4GHz,915MHz
test_rates = none

[fork]
# Stock ExpressLRS firmware source. Keep the established binding phrase in its
# existing defines file without importing that tree's compile flags.
dir = /media/anon/WD2TB/DataVault/TechProjects/Software/GitRepos/PrivacyLRS
binding_defines = /media/anon/WD2TB/DataVault/TechProjects/Software/GitRepos/PrivacyLRS/src/user_defines.txt

[unit.nomad]
role = tx
env = Unified_ESP32_LR1121_TX_via_UART
target = radiomaster.tx_dual.nomad
port = /dev/serial/by-path/pci-0000:02:00.0-usb-0:8:1.0-port0
flash_baud = 460800
domain = fcc_915

[unit.xr1]
role = rx
env = Unified_ESP32C3_LR1121_RX_via_UART
target = radiomaster.rx_dual.xr1
port = /dev/serial/by-path/pci-0000:02:00.0-usb-0:9:1.0-port0
# runtime CRSF baud, patched into the image via --rx-baud and used for the
# bl-trigger + in-app-stub flashing path (no reset lines on this adapter)
rx_baud = 460800
# Required for rate/band sweeps: a disconnected RX must scan other RF modes.
lock_on_first_connection = false
domain = fcc_915
